<!DOCTYPE html>
<html lang="en">
<head>
  <title>Something Went Wrong - Pact</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb; color: #1f2937;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .container { text-align: center; padding: 2rem; max-width: 480px; }
    .emoji { font-size: 80px; margin-bottom: 1rem; }
    .glitch {
      animation: glitch 2s ease-in-out infinite;
    }
    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0); opacity: 1; }
      92% { transform: translate(-2px, 1px); opacity: 0.8; }
      94% { transform: translate(2px, -1px); opacity: 0.9; }
      96% { transform: translate(-1px, -2px); opacity: 0.7; }
      98% { transform: translate(1px, 2px); opacity: 1; }
    }
    .code { font-size: 120px; font-weight: 800; color: #e5e7eb; line-height: 1; margin-bottom: 0.5rem; letter-spacing: -4px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #6b7280; font-size: 1rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .tagline { font-style: italic; color: #9ca3af; font-size: 0.875rem; margin-bottom: 2rem; }
    a {
      display: inline-block; padding: 0.75rem 1.5rem;
      background: #2563eb; color: white; text-decoration: none;
      border-radius: 0.5rem; font-weight: 600; font-size: 0.875rem;
      transition: background 0.2s;
    }
    a:hover { background: #1d4ed8; }
    .brand { margin-top: 3rem; font-size: 0.75rem; color: #d1d5db; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji glitch">🫠</div>
    <div class="code">500</div>
    <h1>Well, this is embarrassing</h1>
    <p>Our servers just had an existential crisis. They're asking the big questions now, like "Why am I even a server?" We're helping them through it.</p>
    <div class="tagline">"I came, I saw, I crashed." — This server, just now</div>
    <a href="/">Let's pretend this never happened</a>
    <div class="brand">Pact</div>
  </div>
</body>
</html>
