<!DOCTYPE html>
<html lang="en">
<head>
  <title>Unprocessable Request - Pact</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb; color: #1f2937;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .container { text-align: center; padding: 2rem; max-width: 480px; }
    .emoji { font-size: 80px; margin-bottom: 1rem; animation: shake 0.5s ease-in-out infinite alternate; }
    @keyframes shake {
      0% { transform: rotate(-3deg); }
      100% { transform: rotate(3deg); }
    }
    .code { font-size: 120px; font-weight: 800; color: #e5e7eb; line-height: 1; margin-bottom: 0.5rem; letter-spacing: -4px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #6b7280; font-size: 1rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .tagline { font-style: italic; color: #9ca3af; font-size: 0.875rem; margin-bottom: 2rem; }
    a {
      display: inline-block; padding: 0.75rem 1.5rem;
      background: #2563eb; color: white; text-decoration: none;
      border-radius: 0.5rem; font-weight: 600; font-size: 0.875rem;
      transition: background 0.2s;
    }
    a:hover { background: #1d4ed8; }
    .brand { margin-top: 3rem; font-size: 0.75rem; color: #d1d5db; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🤔</div>
    <div class="code">422</div>
    <h1>That didn't quite work</h1>
    <p>Something about your request made our servers scratch their heads. It's like trying to sign a document with invisible ink — technically possible, but not very useful.</p>
    <div class="tagline">"Have you tried turning it off and on again?" — Every IT person ever</div>
    <a href="/">Back to safety</a>
    <div class="brand">Pact</div>
  </div>
</body>
</html>
